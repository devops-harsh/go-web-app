name: go-web-app-workflow_ci

on:
  push:
    branches:
      - main
    paths-ignore:  # it will ignore this file updates as this is not recommended
      - "README.md"
      - "helm/**"

jobs: # our workflow devided into the following jobs 

  build:  # 1) first job is to build the go-web-app project 
    runs-on: ubuntu-latest # it will run on the ubuntu latest server

    steps: # one job contain the multiple steps
      - name: Checkout repository # checkout to the repository
        uses: actions/checkout@v4 # this is checkout action i will get this from the github action marketplace

      - name: Set up Go 1.22     # this is will install the go language on actions so we can use any go command
        uses: actions/setup-go@v2
        with:  # what setting or configuration to use 
          go-version: 1.22  # specifying the go version we require go version 1.22 here

      - name: Build # we ae building our go-web-app
        run: go build -o go-web-app # run command is used to execute the shell command ( cmd commands)

      - name: Test  
        run: go test ./... # runs the test in the current dir and all dir

  code-quality: # 2) this is our second job which is used to test the 
    runs-on: ubuntu-latest # same running on the ubuntu latest server

    steps:
      - name: Checkout repository  # checkout repo
        uses: actions/checkout@v4

      - name: Run golangci-lint 
        uses: golangci/golangci-lint-action@v6 # go lang linter action which is used to check run multiple linter together and check our code 
        with: 
          version: v1.56.2

  docker-push: # 3) our thrid job is to build the docker image and push it on the docker hub 
    runs-on: ubuntu-latest # same running on the ubuntu latest server

    needs: build # do not start this job untill build job was not completed 

    steps:
      - name: Checkout repository 
        uses: actions/checkout@v4

      - name: Set up Docker Buildx # it will install docker buildx on the server buildx is advance docker image builder 
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4 # login to the docker hub 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # 
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push 
        uses: docker/build-push-action@v7 # this is used to build the docker image and push it on the dockerhub
        with: # this is configuration
          context: . # uses the current repo for the build context 
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app:${{ github.run_id }}

  update-newtag-in-helm-chart: # 4) this is update helm tag value in the helm chart 
    runs-on: ubuntu-latest # same running on the ubuntu latest server

    needs: docker-push 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update tag in Helm chart
        run: |  # using sed stream editor to the update the particular value/text from the the text file and | - reprsent here as i can add multiple cmd 
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' helm/go-web-app-chart/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "devharsh2409@gmail.com"
          git config --global user.name "HarshLKadam"
          git add helm/go-web-app-chart/values.yaml
          git commit -m "Update tag in Helm chart"
          git push